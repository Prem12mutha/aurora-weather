<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beautiful real-time global weather conditions powered by Python and Open-Meteo.">
    <title>Aurora Weather App</title>
    <!-- Use lighter/luxurious weights of Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="brand">
                    <svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                        <circle cx="27" cy="13" r="6" fill="currentColor"/>
                    </svg>
                    <h1>Aurora</h1>
                </div>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Light/Dark Theme">
                    <svg id="sun-icon" class="theme-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moon-icon" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter a location..." autocomplete="off">
                <button id="search-btn" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div id="error-message" class="error-message hidden"></div>

            <div id="weather-card" class="glass-card hidden">
                <div class="weather-top-row">
                    <!-- Left Side: Main Temp -->
                    <div class="weather-main">
                        <h2 id="location-name">City Name</h2>
                        <div id="temperature-main" class="temp-main">0°C</div>
                    </div>
                    
                    <!-- Right Side: Horizontal Metrics Grid -->
                    <div class="metrics-grid">
                        <div class="metric">
                            <span class="label">Feels Like</span>
                            <span id="feels-like" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Humidity</span>
                            <span id="humidity" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Wind Speed</span>
                            <span id="wind-speed" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Cloud Cover</span>
                            <span id="cloud-cover" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Precip</span>
                            <span id="precipitation" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Pressure</span>
                            <span id="pressure" class="value">--</span>
                        </div>
                    </div>
                </div>
                
                <!-- Bottom Side: 7-Day Forecast Row -->
                <div class="forecast-section">
                    <h3>7-Day Forecast</h3>
                    <div class="forecast-grid" id="forecast-grid">
                        <!-- Javascript populates days here -->
                    </div>
                </div>
            </div>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
            </div>
        </main>
    </div>
</body>
</html>
